name: Deploy Prod

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "TAG=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push xiaozhi-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-server
          push: true
          tags: |
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}/xiaozhi-server:${{ steps.version.outputs.TAG }}
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}/xiaozhi-server:latest
          cache-from: type=gha,scope=xiaozhi-server
          cache-to: type=gha,mode=max,scope=xiaozhi-server

      - name: Build and push manager-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-web
          push: true
          tags: |
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}/xiaozhi-manager-web:${{ steps.version.outputs.TAG }}
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}/xiaozhi-manager-web:latest
          cache-from: type=gha,scope=manager-web
          cache-to: type=gha,mode=max,scope=manager-web

      - name: Build and push manager-mobile
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-mobile
          push: true
          tags: |
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}/xiaozhi-manager-mobile:${{ steps.version.outputs.TAG }}
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}/xiaozhi-manager-mobile:latest
          cache-from: type=gha,scope=manager-mobile
          cache-to: type=gha,mode=max,scope=manager-mobile

  deploy:
    name: Deploy to 192.168.1.75
    runs-on: self-hosted
    needs: build
    steps:
      - name: Login to Aliyun ACR
        run: echo "${{ secrets.ALIYUN_ACR_PASSWORD }}" | docker login --username ${{ secrets.ALIYUN_ACR_USERNAME }} --password-stdin ${{ secrets.ALIYUN_ACR_REGISTRY }}

      - name: Pull and deploy
        run: |
          cd /opt/xiaozhi
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f

      - name: Health check
        run: |
          sleep 30
          curl -sf http://192.168.1.75:8002/xiaozhi/doc.html -o /dev/null && echo "manager-web OK" || echo "manager-web FAIL"
